<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1976D2">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Автошкола">
<title>Автошкола</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
  background: #f5f5f5;
  color: #212121;
  min-height: 100vh;
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 480px;
  min-height: 100vh;
  background: #ffffff;
  position: relative;
  overflow-x: hidden;
}

/* Header */
.header {
  background: #1976D2;
  color: #fff;
  padding: 16px;
  font-size: 20px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  min-height: 56px;
}

.header .btn-back {
  background: none;
  border: none;
  color: #fff;
  font-size: 24px;
  padding: 8px;
  cursor: pointer;
  min-width: 48px;
  min-height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.header .btn-back.hidden {
  display: none;
}

.header .header-title {
  flex: 1;
}

/* Pages */
.page {
  display: none;
  animation: fadeIn 0.25s ease;
}

.page.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Student List */
.student-list {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-bottom: 100px;
}

.student-card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.student-card:active {
  transform: scale(0.97);
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}

.student-card .student-photo {
  width: 150px;
  height: 150px;
  border-radius: 16px;
  object-fit: cover;
  flex-shrink: 0;
  background: #e0e0e0;
}

.student-card .student-info {
  flex: 1;
}

.student-card .student-name {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 4px;
}

.student-card .student-year {
  font-size: 14px;
  color: #757575;
}

/* Add Button */
.add-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: #1976D2;
  color: #fff;
  border: none;
  font-size: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 12px rgba(25,118,210,0.4);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  touch-action: manipulation;
  z-index: 50;
  -webkit-tap-highlight-color: transparent;
}

.add-btn:active {
  transform: scale(0.92);
  box-shadow: 0 2px 8px rgba(25,118,210,0.3);
}

/* Forms */
.form-container {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.form-group label {
  font-size: 14px;
  font-weight: 500;
  color: #424242;
}

.form-group input,
.form-group textarea {
  width: 100%;
  padding: 14px 12px;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  font-size: 16px;
  background: #fff;
  transition: border-color 0.2s;
  font-family: inherit;
}

.form-group input:focus,
.form-group textarea:focus {
  outline: none;
  border-color: #1976D2;
  box-shadow: 0 0 0 2px rgba(25,118,210,0.1);
}

.form-group textarea {
  min-height: 80px;
  resize: vertical;
}

.photo-upload {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.photo-preview {
  width: 150px;
  height: 150px;
  border-radius: 16px;
  object-fit: cover;
  background: #e0e0e0;
  border: 2px dashed #bdbdbd;
  cursor: pointer;
}

.photo-upload-btn {
  padding: 10px 24px;
  background: #e3f2fd;
  color: #1976D2;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  min-height: 48px;
  touch-action: manipulation;
}

.save-btn {
  width: 100%;
  padding: 16px;
  background: #1976D2;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  min-height: 48px;
  transition: background 0.2s;
  touch-action: manipulation;
}

.save-btn:active {
  background: #1565C0;
}

.delete-btn {
  width: 100%;
  padding: 16px;
  background: #fff;
  color: #d32f2f;
  border: 2px solid #ffcdd2;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  min-height: 48px;
  margin-top: 16px;
  transition: background 0.2s;
  touch-action: manipulation;
}

.delete-btn:active {
  background: #ffebee;
}

/* Student Card Page */
.student-detail {
  padding: 16px;
}

.student-detail .detail-photo {
  width: 200px;
  height: 200px;
  border-radius: 16px;
  object-fit: cover;
  display: block;
  margin: 0 auto 12px;
  background: #e0e0e0;
}

.student-detail .detail-name {
  text-align: center;
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 4px;
}

.student-detail .detail-year {
  text-align: center;
  font-size: 15px;
  color: #757575;
  margin-bottom: 20px;
}

/* Lessons Section */
.lessons-section {
  margin-top: 8px;
}

.lessons-section h3 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 12px;
  color: #212121;
}

.lesson-item {
  background: #fafafa;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 12px;
  border: 1px solid #eeeeee;
}

.lesson-item .lesson-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.lesson-item .lesson-date {
  font-weight: 600;
  font-size: 14px;
  color: #1976D2;
}

.lesson-item .lesson-skills {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 8px;
}

.lesson-item .skill-tag {
  background: #e3f2fd;
  color: #1565C0;
  font-size: 12px;
  padding: 3px 8px;
  border-radius: 12px;
  font-weight: 500;
}

.lesson-item .lesson-comment {
  font-size: 14px;
  color: #616161;
  line-height: 1.4;
}

.add-lesson-btn {
  width: 100%;
  padding: 14px;
  background: #e3f2fd;
  color: #1976D2;
  border: 2px dashed #90caf9;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  min-height: 48px;
  touch-action: manipulation;
  transition: background 0.2s;
}

.add-lesson-btn:active {
  background: #bbdefb;
}

/* Skills Checkboxes Grid */
.skills-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.skill-checkbox {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: #f5f5f5;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.skill-checkbox input[type="checkbox"] {
  width: 20px;
  height: 20px;
  accent-color: #1976D2;
  flex-shrink: 0;
}

.skill-checkbox label {
  font-size: 14px;
  cursor: pointer;
  flex: 1;
}

.skill-checkbox:has(input:checked) {
  background: #e3f2fd;
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 40px 16px;
  color: #9e9e9e;
}

.empty-state p {
  font-size: 16px;
}

/* Modal overlay */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  justify-content: center;
  align-items: flex-end;
}

.modal-overlay.active {
  display: flex;
}

.modal-content {
  background: #fff;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  border-radius: 16px 16px 0 0;
  overflow-y: auto;
  padding: 20px 16px 32px;
  animation: slideUp 0.25s ease;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal-content h3 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 16px;
  text-align: center;
}

.modal-close {
  background: none;
  border: none;
  font-size: 24px;
  color: #757575;
  position: absolute;
  top: 12px;
  right: 16px;
  cursor: pointer;
  min-width: 48px;
  min-height: 48px;
}

/* Confirm dialog */
.confirm-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 300;
  justify-content: center;
  align-items: center;
}

.confirm-overlay.active {
  display: flex;
}

.confirm-box {
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  width: 300px;
  text-align: center;
}

.confirm-box p {
  font-size: 16px;
  margin-bottom: 20px;
  color: #424242;
}

.confirm-box .confirm-buttons {
  display: flex;
  gap: 12px;
}

.confirm-box .confirm-buttons button {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  min-height: 48px;
  border: none;
}

.confirm-box .btn-cancel {
  background: #f5f5f5;
  color: #424242;
}

.confirm-box .btn-delete {
  background: #d32f2f;
  color: #fff;
}

/* Scrollbar */
::-webkit-scrollbar {
  width: 4px;
}

::-webkit-scrollbar-thumb {
  background: #bdbdbd;
  border-radius: 2px;
}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Header -->
  <div class="header" id="header">
    <button class="btn-back hidden" id="btnBack" onclick="navigateBack()">←</button>
    <span class="header-title" id="headerTitle">Автошкола</span>
  </div>

  <!-- Main page: Student list -->
  <div class="page active" id="pageMain">
    <div class="student-list" id="studentList"></div>
    <button class="add-btn" onclick="showAddStudentForm()" aria-label="Добавить ученика">+</button>
  </div>

  <!-- Student card page -->
  <div class="page" id="pageStudent"></div>

  <!-- Modal for forms -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <!-- Confirm dialog -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <p id="confirmMessage">Вы уверены?</p>
      <div class="confirm-buttons">
        <button class="btn-cancel" onclick="closeConfirm()">Отмена</button>
        <button class="btn-delete" id="confirmDeleteBtn" onclick="executeConfirm()">Удалить</button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
