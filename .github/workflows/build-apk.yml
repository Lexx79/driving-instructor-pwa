name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate TWA APK
        run: |
          mkdir -p output
          echo "y" | npx @bubblewrap/cli build --manifest "https://lexx79.github.io/driving-instructor-pwa/manifest.json" --directory ./output
        continue-on-error: true

      - name: Find APK
        run: |
          find / -name "*.apk" -type f 2>/dev/null | head -20
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Autoshkola-APK
          path: |
            **/*.apk
            **/*.aab
          if-no-files-found: warn
