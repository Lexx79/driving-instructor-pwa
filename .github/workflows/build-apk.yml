name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Generate TWA project
        run: node generate-twa.js https://lexx79.github.io/driving-instructor-pwa/manifest.json twa-build

      - name: Create keystore
        working-directory: twa-build
        run: |
          keytool -genkey -v -keystore release.keystore \
            -alias android -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android -keypass android \
            -dname "CN=Developer, OU=Dev, O=DrivingInstructor, L=Abakan, S=Khakasia, C=RU"

      - name: Build APK with Gradle
        working-directory: twa-build
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Align and sign APK
        working-directory: twa-build
        run: |
          UNSIGNED_APK=$(find . -name "app-release-unsigned.apk" -type f | head -1)
          echo "Found APK: $UNSIGNED_APK"
          if [ -z "$UNSIGNED_APK" ]; then
            echo "No APK found!"
            exit 1
          fi
          # Find build-tools directory
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | head -1)
          echo "Using build-tools: $BUILD_TOOLS"
          # Copy and zipalign
          cp "$UNSIGNED_APK" app-unsigned-aligned.apk
          "$BUILD_TOOLS/zipalign" -v -p 4 app-unsigned-aligned.apk app-aligned.apk
          # Sign
          "$BUILD_TOOLS/apksigner" sign \
            --ks release.keystore \
            --ks-key-alias android \
            --ks-pass pass:android \
            --key-pass pass:android \
            app-aligned.apk
          # Verify
          "$BUILD_TOOLS/apksigner" verify app-aligned.apk
          # Rename to final name
          cp app-aligned.apk app-release-signed.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: driving-instructor-apk
          path: twa-build/app-release-signed.apk
