name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Generate TWA project
        run: node generate-twa.js https://lexx79.github.io/driving-instructor-pwa/manifest.json twa-build

      - name: Build APK with Bubblewrap
        working-directory: twa-build
        run: npx @bubblewrap/cli build

      - name: Find APK
        run: |
          find . -name "*.apk" -type f
          mkdir -p apk-output
          find . -name "*.apk" -type f -exec cp {} apk-output/ \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: driving-instructor-apk
          path: apk-output/
