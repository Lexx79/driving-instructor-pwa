name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init TWA project (non-interactive)
        run: |
          # "n" for "install JDK" and "install Android SDK" - both already installed
          printf 'n\nn\n' | npx @bubblewrap/cli init \
            --manifest https://lexx79.github.io/driving-instructor-pwa/manifest.json \
            --directory twa-build
          ls -la twa-build/ 2>/dev/null
          cat twa-build/twa-manifest.json 2>/dev/null

      - name: Build APK
        working-directory: twa-build
        run: npx @bubblewrap/cli build

      - name: Find APK
        run: |
          find . -name "*.apk" -type f
          mkdir -p apk-output
          find . -name "*.apk" -type f -exec cp {} apk-output/ \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: driving-instructor-apk
          path: apk-output/
