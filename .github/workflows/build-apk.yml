name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Check CLI options
        run: |
          npx @bubblewrap/cli --help 2>&1
          echo "=== BUILD HELP ==="
          npx @bubblewrap/cli build --help 2>&1
        continue-on-error: true
